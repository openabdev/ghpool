name: E2E

# Runs the MCP proxy e2e suite against GitHub's hosted MCP server.
# Deliberately NOT triggered on pull_request: the required user token
# (E2E_GHPOOL_PAT secret) must never be exposed to fork PR workflows.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/e2e-mcp.sh"
      - ".github/workflows/e2e.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e-mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: cargo build
      - name: e2e — MCP reverse proxy against hosted endpoint
        env:
          # Must be a user token (PAT); the Actions installation token is not
          # accepted by api.githubcopilot.com. Script exits 0 with a skip
          # message when unset.
          GITHUB_TOKEN: ${{ secrets.E2E_GHPOOL_PAT }}
        run: ./scripts/e2e-mcp.sh

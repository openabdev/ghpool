name: CI

on:
  pull_request:
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "obk/**"
      - ".github/workflows/ci.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-07-13)
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 (2026-03-12)
        with:
          workspaces: |
            .
            obk
      - name: cargo check
        run: cargo check
      - name: cargo clippy
        run: cargo clippy -- -D warnings
      - name: cargo test
        run: cargo test
      # obk is a separate crate (not a workspace member): the git credential
      # helper's fail-closed contract must be enforced in CI too.
      - name: obk clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: obk
      - name: obk test
        run: cargo test
        working-directory: obk

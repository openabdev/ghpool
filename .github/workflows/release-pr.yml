name: Release PR

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (leave empty to auto-bump minor, or specify e.g. 0.2.0)"
        required: false
        type: string

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
            IFS='.' read -r major minor patch <<< "$CURRENT"
            minor=$((minor + 1))
            patch=0
            VERSION="${major}.${minor}.${patch}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "::notice::Release version: ${VERSION}"

      - name: Update Cargo.toml version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/^version = .*/version = \"${VERSION}\"/" Cargo.toml

      - name: Create release PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          BRANCH="release/v${VERSION}"
          git config user.name "openab-app[bot]"
          git config user.email "274185012+openab-app[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git diff --cached --quiet && git commit --allow-empty -m "release: v${VERSION}" || git commit -m "release: v${VERSION}"
          git push origin "$BRANCH"
          gh pr create \
            --title "release: v${VERSION}" \
            --body "Merge this PR to tag \`v${VERSION}\` and trigger the release build." \
            --base main --head "$BRANCH"
